name: Mobile App Build

# Triggered manually or on tag push (e.g. `v1.0.0`, `v1.0.1`).
# Produces unsigned `.aab` (Android) and `.ipa` (iOS) artefacts ready for
# signing + store submission. Add the actual signing certs/keys as
# repository secrets once your dev accounts are verified.

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes for this build'
        required: false
        default: 'See CHANGELOG.md'
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  build-web:
    name: Build Web Bundle
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag (or fallback)
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev.${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install deps
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Write production .env
        working-directory: frontend
        run: |
          cat > .env.production <<EOF
          VITE_API_URL=${{ secrets.PROD_API_URL }}
          VITE_APP_VERSION=${{ steps.version.outputs.version }}
          VITE_APP_STORE_URL=${{ secrets.APP_STORE_URL }}
          VITE_PLAY_STORE_URL=${{ secrets.PLAY_STORE_URL }}
          EOF

      - name: Build Vite bundle
        working-directory: frontend
        run: yarn build

      - name: Upload web bundle
        uses: actions/upload-artifact@v4
        with:
          name: web-bundle
          path: frontend/dist
          retention-days: 7

  android:
    name: Android (.aab)
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install deps
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Download web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-bundle
          path: frontend/dist

      - name: Capacitor sync
        working-directory: frontend
        run: npx cap sync android

      - name: Build release bundle
        working-directory: frontend/android
        run: ./gradlew bundleRelease

      - name: Upload .aab
        uses: actions/upload-artifact@v4
        with:
          name: oryno-android-${{ needs.build-web.outputs.version }}-unsigned.aab
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

  ios:
    name: iOS (.ipa)
    runs-on: macos-14
    needs: build-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install deps
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Download web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-bundle
          path: frontend/dist

      - name: Capacitor sync
        working-directory: frontend
        run: npx cap sync ios

      - name: Pod install
        working-directory: frontend/ios/App
        run: pod install --repo-update

      - name: Build archive (unsigned)
        working-directory: frontend/ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Upload .xcarchive (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: oryno-ios-${{ needs.build-web.outputs.version }}-unsigned.xcarchive
          path: frontend/ios/App/build/App.xcarchive
          retention-days: 30
